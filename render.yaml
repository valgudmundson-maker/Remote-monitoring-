# Render Blueprint — deploys the app as a free web service.
# In the Render dashboard: New > Blueprint, connect this repo, and deploy.
services:
  - type: web
    name: stock-technical-analysis
    runtime: python
    plan: free
    branch: claude/stock-ticker-analysis-app-JVuFd
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Optional: enables real same-day intraday data + fundamentals on cloud
      # hosts (Yahoo throttles datacenter IPs). Get a free key at
      # https://www.alphavantage.co/support/#api-key and set it in the Render
      # dashboard. Leave unset to use the Stooq daily fallback.
      - key: ALPHAVANTAGE_API_KEY
        sync: false
