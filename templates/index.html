<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Same-Day Technical Analysis</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --bull: #3fb950;
      --bear: #f85149;
      --neutral: #d29922;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 28px 20px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0 0 4px; font-size: 1.6rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    form {
      display: flex; gap: 10px; margin-bottom: 8px;
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex: 1; min-width: 220px;
      padding: 12px 14px; font-size: 1rem;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
    }
    input[type="text"]:focus { outline: none; border-color: var(--accent); }
    button {
      padding: 12px 22px; font-size: 1rem; font-weight: 600;
      background: var(--accent); color: #0d1117;
      border: none; border-radius: 8px; cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: default; }
    .hint { color: var(--muted); font-size: 0.8rem; margin-bottom: 20px; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 20px;
    }
    .card-head {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
    }
    .card-head h2 { margin: 0; font-size: 1.4rem; }
    .price { font-size: 1.5rem; font-weight: 700; }
    .badge {
      padding: 3px 10px; border-radius: 999px; font-size: 0.78rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .bull { color: var(--bull); } .badge.bull { background: rgba(63,185,80,.15); }
    .bear { color: var(--bear); } .badge.bear { background: rgba(248,81,73,.15); }
    .neutral { color: var(--neutral); } .badge.neutral { background: rgba(210,153,34,.15); }
    .as-of { color: var(--muted); font-size: 0.8rem; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px; margin: 14px 0;
    }
    .metric {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
    }
    .metric .label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: .04em; }
    .metric .value { font-size: 1.05rem; font-weight: 600; margin-top: 2px; }
    .signals { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .signal {
      display: flex; flex-direction: column;
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; min-width: 150px; background: var(--bg);
    }
    .signal .name { font-weight: 700; font-size: 0.85rem; }
    .signal .detail { color: var(--muted); font-size: 0.78rem; }
    .chart-wrap { margin-top: 16px; height: 240px; }
    .error { color: var(--bear); }
    .spinner { text-align: center; color: var(--muted); padding: 30px; }
    footer { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>📈 Same-Day Technical Analysis</h1>
    <p>Enter stock tickers for intraday (5-minute) technical indicators &amp; signals.</p>
  </header>

  <div class="container">
    <form id="form">
      <input id="tickers" type="text" placeholder="e.g. AAPL, MSFT, TSLA" autocomplete="off" autofocus />
      <button type="submit" id="go">Analyze</button>
    </form>
    <div class="hint">Separate multiple tickers with spaces or commas (up to 10). Data is for the current trading session.</div>

    <div id="results"></div>
  </div>

  <footer>
    For educational/informational use only — not financial advice. Data via Yahoo Finance.
  </footer>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('tickers');
    const results = document.getElementById('results');
    const goBtn = document.getElementById('go');
    const charts = {};

    function fmt(v, prefix = '', suffix = '') {
      if (v === null || v === undefined) return '—';
      return prefix + v.toLocaleString() + suffix;
    }

    function metric(label, value) {
      return `<div class="metric"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    function renderResult(r) {
      if (r.error) {
        return `<div class="card"><div class="card-head"><h2>${r.ticker}</h2></div>
                <div class="error">${r.error}</div></div>`;
      }
      const m = r.metrics;
      const changeClass = (m.change ?? 0) >= 0 ? 'bull' : 'bear';
      const changeSign = (m.change ?? 0) >= 0 ? '+' : '';

      const signals = r.signals.map(s =>
        `<div class="signal">
           <span class="name ${s.sentiment}">${s.name}</span>
           <span class="detail">${s.detail}</span>
         </div>`).join('');

      const chartId = `chart-${r.ticker}`;

      return `
        <div class="card">
          <div class="card-head">
            <h2>${r.ticker} <span class="badge ${r.overall}">${r.overall}</span></h2>
            <div style="text-align:right">
              <div class="price">${fmt(m.price, '$')}
                <span class="${changeClass}" style="font-size:1rem">
                  ${changeSign}${fmt(m.change)} (${changeSign}${fmt(m.change_pct, '', '%')})
                </span>
              </div>
              <div class="as-of">As of ${r.as_of} · ${r.interval} bars</div>
            </div>
          </div>

          <div class="grid">
            ${metric('Open', fmt(m.session_open, '$'))}
            ${metric('Day High', fmt(m.day_high, '$'))}
            ${metric('Day Low', fmt(m.day_low, '$'))}
            ${metric('Volume', fmt(m.volume))}
            ${metric('VWAP', fmt(m.vwap, '$'))}
            ${metric('RSI(14)', fmt(m.rsi))}
            ${metric('SMA(20)', fmt(m.sma20, '$'))}
            ${metric('EMA(20)', fmt(m.ema20, '$'))}
            ${metric('MACD', fmt(m.macd))}
            ${metric('Signal', fmt(m.macd_signal))}
            ${metric('BB Upper', fmt(m.bb_upper, '$'))}
            ${metric('BB Lower', fmt(m.bb_lower, '$'))}
            ${metric('ATR(14)', fmt(m.atr))}
          </div>

          <div class="signals">${signals}</div>

          <div class="chart-wrap"><canvas id="${chartId}"></canvas></div>
        </div>`;
    }

    function drawChart(r) {
      const el = document.getElementById(`chart-${r.ticker}`);
      if (!el || !r.chart) return;
      if (charts[r.ticker]) charts[r.ticker].destroy();
      charts[r.ticker] = new Chart(el, {
        type: 'line',
        data: {
          labels: r.chart.times,
          datasets: [
            { label: 'Price', data: r.chart.close, borderColor: '#58a6ff',
              borderWidth: 1.8, pointRadius: 0, tension: 0.2 },
            { label: 'VWAP', data: r.chart.vwap, borderColor: '#d29922',
              borderWidth: 1.2, pointRadius: 0, borderDash: [5, 4], tension: 0.2 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: { ticks: { color: '#8b949e', maxTicksLimit: 8 }, grid: { color: '#21262d' } },
            y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } }
          },
          plugins: { legend: { labels: { color: '#e6edf3' } } }
        }
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const tickers = input.value.trim();
      if (!tickers) return;
      goBtn.disabled = true;
      results.innerHTML = '<div class="spinner">Fetching market data…</div>';
      try {
        const resp = await fetch('/api/analyze?tickers=' + encodeURIComponent(tickers));
        const data = await resp.json();
        if (data.error) {
          results.innerHTML = `<div class="card error">${data.error}</div>`;
          return;
        }
        results.innerHTML = data.results.map(renderResult).join('');
        data.results.forEach(drawChart);
      } catch (err) {
        results.innerHTML = `<div class="card error">Request failed: ${err.message}</div>`;
      } finally {
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
